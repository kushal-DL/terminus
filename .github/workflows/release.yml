name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest-asyncio
      - name: Run tests
        run: pytest tests/ -v --tb=short -m "not slow"

  build-wheel:
    # Only require 3.12 to have passed — don't block on 3.11/3.13 flakiness
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest-asyncio build
      - name: Run tests on 3.12 (gate)
        run: pytest tests/ -v --tb=short -m "not slow"
      - name: Build wheel and sdist
        run: python -m build
      - name: List built files
        run: ls -lh dist/
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  release:
    needs: build-wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: List release files
        run: |
          echo "dist/ contents:"
          ls -lh dist/
          echo "launcher files:"
          ls -lh play.bat play.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
            play.bat
            play.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
