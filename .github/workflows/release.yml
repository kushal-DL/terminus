name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest-asyncio
      - name: Run tests
        run: pytest tests/ -v --tb=short -m "not slow"

  build-wheel:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel and sdist
        run: |
          pip install build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  build-exe:
    needs: test
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: terminus-windows.exe
            exe-path: dist/terminus.exe
          - os: ubuntu-latest
            artifact: terminus-linux
            exe-path: dist/terminus
          - os: macos-latest
            artifact: terminus-macos
            exe-path: dist/terminus
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller
          pip install -e .
      - name: Build executable
        run: python -m PyInstaller terminus.spec --clean --noconfirm
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.exe-path }}

  release:
    needs: [build-wheel, build-exe]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Organise release files
        run: |
          mkdir -p release-files
          # Wheel + sdist
          cp artifacts/dist/* release-files/ 2>/dev/null || true
          # Executables — rename to platform-specific names
          cp "artifacts/terminus-windows.exe/terminus.exe" release-files/terminus-windows.exe 2>/dev/null || true
          cp "artifacts/terminus-linux/terminus"           release-files/terminus-linux        2>/dev/null || true
          cp "artifacts/terminus-macos/terminus"           release-files/terminus-macos        2>/dev/null || true
          chmod +x release-files/terminus-linux release-files/terminus-macos 2>/dev/null || true
          ls -lh release-files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
